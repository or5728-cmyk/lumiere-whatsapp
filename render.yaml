services:
  - type: web
    name: lumiere-whatsapp-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_PATH
        value: /data/conversations.db
      - key: MAX_HISTORY
        value: "20"
    disk:
      name: lumiere-data
      mountPath: /data
      sizeGB: 1
